# Per-module dart codegen.
# Invoked by the proto-generate-dart target as:
#   buf generate --template buf.gen.dart.device.yaml device
# The positional input scopes generation to this module only, so each
# dart package contains only its own module's protos (plus transitively
# imported well-known types: buf, common, gnostic, google).
#
# We DO NOT use clean: true here; the proto-generate-dart target
# manually purges sibling-module dirs to avoid wiping hand-written
# files like client.dart.
version: v2
managed:
  enabled: true

plugins:
  - remote: buf.build/protocolbuffers/dart:v21.1.2
    out: ../sdk/dart/device/lib/src
    include_imports: true
    include_wkt: true

  - remote: buf.build/connectrpc/dart
    out: ../sdk/dart/device/lib/src
    include_imports: true
    include_wkt: true
