version: v2
modules:
  - path: profile
    name: buf.build/antinvestor/profile
  - path: device
    name: buf.build/antinvestor/device
  - path: settings
    name: buf.build/antinvestor/settingz
  - path: ocr
    name: buf.build/antinvestor/ocr
  - path: geolocation
    name: buf.build/antinvestor/geolocation
deps:
  - buf.build/antinvestor/common
  - buf.build/bufbuild/protovalidate
  - buf.build/gnostic/gnostic
lint:
  use:
    - STANDARD
  except:
    - FIELD_NOT_REQUIRED
    - PACKAGE_NO_IMPORT_CYCLE
    - RPC_RESPONSE_STANDARD_NAME
    - RPC_REQUEST_RESPONSE_UNIQUE
breaking:
  use:
    - FILE
  except:
    - EXTENSION_NO_DELETE
    - FIELD_SAME_DEFAULT
