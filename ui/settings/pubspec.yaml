name: antinvestor_ui_settings
description: >
  Settings management UI library for Antinvestor. Embeddable screens and widgets
  for viewing, searching, and editing application settings.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  antinvestor_ui_core:
    path: ../../../common/ui_core
  antinvestor_api_settings: ^0.1.0
  antinvestor_api_common: ^1.52.0
  connectrpc: ^1.0.0
  flutter_riverpod: ^3.2.1
  go_router: ^17.1.0
  protobuf: ^4.2.0
  riverpod_annotation: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  riverpod_generator: ^4.0.3

flutter:
  uses-material-design: true
